name: Deploy Global 26 to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key

      - name: Test SSH port
        run: |
          echo "Testing SSH connectivity..."
          nc -vz ${{ secrets.HOSTINGER_HOST }} ${{ secrets.HOSTINGER_PORT }}

      - name: Deploy with rsync and retries
        run: |
          for i in 1 2 3 4 5; do
            echo "Deploy attempt $i..."
            rsync -avz --delete \
              -e "ssh -i ~/.ssh/hostinger_key -p ${{ secrets.HOSTINGER_PORT }} -o StrictHostKeyChecking=no -o ConnectTimeout=30" \
              site/ \
              ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_REMOTE_PATH }}/ \
            && echo "Deploy completed successfully." && exit 0

            echo "Attempt $i failed. Waiting 30 seconds..."
            sleep 30
          done

          echo "Deploy failed after 5 attempts."
          exit 1
